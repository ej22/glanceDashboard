  - name: 3D Printing
    columns:
      - size: small
        widgets:
          - type: todo
            id: 3dprinting-tasks
            title: Print Queue

      - size: full
        widgets:
          - type: group
            widgets:
              - type: reddit
                subreddit: 3Dprinting
                show-thumbnails: true
                limit: 10
                collapse-after: 5

              - type: reddit
                subreddit: FixMyPrint
                show-thumbnails: false
                limit: 8
                collapse-after: 4

              - type: reddit
                subreddit: resinprinting
                show-thumbnails: true
                limit: 8
                collapse-after: 4

              - type: reddit
                subreddit: functionalprint
                show-thumbnails: true
                limit: 8
                collapse-after: 4

              - type: reddit
                subreddit: 3Dprintedminis
                show-thumbnails: true
                limit: 8
                collapse-after: 4

      - size: small
        widgets:
          - type: calendar
            first-day-of-week: monday
